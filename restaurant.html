<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lamington Hotel Restaurant</title>

    <link rel="stylesheet" href="restaurant.css">
    <link rel="stylesheet" href="index.css">

</head>

<body>

    <header class="navbar">

        <div class="logo">
            <a href="index.html" class="logo-link">
            <img src="images/LamingtonLogo.png" alt="Lamington Hotel Logo">
            </a> 
        </div>

        <nav>

            <ul class="nav-links">
                <li><a href="restaurant.html">Restaurant</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="reservation.html">Reservation</a></li>
            </ul>

        </nav>

        <a href="reservation.html" class="book-now">Book Now</a>

    </header>

    <section class="restaurant-hero">

        <div class="hero-overlay"></div>

        <div class="hero-content">

            <p class="subtitle"> <i>Dining Experience</i></p>

            <h1>Restaurant Menu Book</h1>

            <p class="hero-text">
                Discover various dishes, local and foreign cuisine,
                and unforgettable dining experiences at Lamington Hotel.
            </p>

        </div>

    </section>

    <section class="menu-cover">

       <img src="images/1.png" alt="Restaurant Menu Cover"
     onmouseover="this.src='images/qr.jpg'"
     onmouseout="this.src='images/1.png'">

    </section>


    <section class="menu-gallery">

        <div class="menu-card">
            <img src="images/2.png" alt="Breakfast Menu">
        </div>

        <div class="menu-card">
            <img src="images/3.png" alt="Soup Menu">
        </div>

        <div class="menu-card">
            <img src="images/4.png" alt="Sandwich Menu">
        </div>

        <div class="menu-card">
            <img src="images/5.png" alt="Pizza Menu">
        </div>

        <div class="menu-card">
            <img src="images/6.png" alt="Grill Menu">
        </div>

        <div class="menu-card">
            <img src="images/7.png" alt="Classic Menu">
        </div>

    </section>


    <footer class="footer">
        <div class="footer-logo">

            <img src="images/LamingtonLogo.png" alt="Lamington Hotel Logo">

        </div>

        <p class="footer-copy">
            © 2026 Lamington Hotel. All rights reserved.
        </p>
    </footer>

</body>

</html>
